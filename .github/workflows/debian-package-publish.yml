# Runs tests and verifies that the package can be built.
name: debian package publish

# Controls when the action will run.
on:
  workflow_call:
    inputs:
      branch:
        description: 'Target branch'
        default: ${{ github.event.release.target_commitish }}
        type: string
      version:
        description: 'Released version'
        default: ${{ github.event.release.tag_name }}
        type: string
      notes:
        description: 'Release notes'
        default: ${{ github.event.release.body }}
        type: string
      message:
        description: 'Commit message'
        default: ${{ github.event.head_commit.message }}
        type: string
    secrets:
      GPG_KEY:
        required: true
      GPG_KEY_ID:
        required: true
      GIT_COMMITTER_EMAIL:
        required: true
      SSH_ID_RSA:
        required: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    runs-on: ubuntu-latest
    name: Build and push package
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GPG
        uses: diepxuan/.github/.github/actions/gpg-setup@main
        with:
          gpg_key: ${{ secrets.GPG_KEY }}
          gpg_key_id: ${{ secrets.GPG_KEY_ID }}
          committer_email: ${{ secrets.GIT_COMMITTER_EMAIL }}
          committer_name: ${{ github.repository_owner }}

      - name: SSH configuration
        uses: diepxuan/.github/.github/actions/ssh-setup@main
        with:
          ssh_key_id: ${{ secrets.SSH_ID_RSA }}

      - name: Checkout PPA repository
        uses: actions/checkout@v4
        with:
          repository: diepxuan/ppa
          path: ppa
          submodules: true

      - name: Update submodule to latest
        working-directory: ppa
        env:
          REPOSITORY: ${{ github.repository }}
          GIT_COMMITTER_MESSAGE: ${{ inputs.message }}
        run: |
          # Extract submodule name from repository
          SUBMODULE_NAME=$(basename "$REPOSITORY")
          SUBMODULE_PATH="src/diepxuan/$SUBMODULE_NAME"
          
          # Check if submodule exists
          if [ ! -d "$SUBMODULE_PATH" ]; then
            echo "Submodule $SUBMODULE_PATH not found"
            exit 1
          fi
          
          # Update submodule to latest
          git submodule update --remote "$SUBMODULE_PATH"
          
          # Commit and push if there are changes
          if [ -n "$(git status --porcelain=v1 2>/dev/null)" ]; then
            git add "$SUBMODULE_PATH"
            git commit -m "${GIT_COMMITTER_MESSAGE:-"chore: update $SUBMODULE_NAME submodule"}"
            if ! git push; then
              git pull --rebase
              git push || true
            fi
          else
            echo "No changes to commit"
          fi
